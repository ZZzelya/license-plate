spring:
  application:
    name: license-plate-service
  datasource:
    url: jdbc:postgresql://localhost:5432/license_plate_db
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect


  task:
    execution:
      pool:
        core-size: 50
        max-size: 100
        queue-capacity: 500
        keep-alive: 60s
      thread-name-prefix: async-task-
    scheduling:
      thread-name-prefix: async-sched-
      pool:
        size: 10

server:
  port: 8080
  tomcat:
    threads:
      max: 200
      min-spare: 20
    accept-count: 200
    connection-timeout: 60000
    keep-alive-timeout: 60000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  show-actuator: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.example.licenseplate: DEBUG
    org.springframework.scheduling: DEBUG
    org.springframework.web: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"